<!DOCTYPE html>
<html>

<head>

<title>PromoVerse</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>PromoVerse</h1>
<p>Advertise & Grow Your Discord Server</p>

<a class="btn" href="https://discord.com/login">Login With Discord</a>

</header>

<section>

<input id="search" placeholder="Search Servers..." onkeyup="searchServer()">

</section>

<section id="submit">

<h2>Submit Your Server</h2>

<input id="name" placeholder="Server Name">
<input id="link" placeholder="Discord Invite">

<button onclick="addServer()">Submit</button>

</section>

<section>

<h2>Server List</h2>

<div id="servers"></div>

</section>

<script src="script.js"></script>

</body>

</html>
